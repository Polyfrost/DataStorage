name: "Check Bundles"
on:
  pull_request:
    paths:
      - oneclient/**
  push:
    paths:
      - oneclient/**
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  pnpm:
    name: install dependencies (pnpm)
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install node dependencies
        run: pnpm i

  CheckBundles:
    name: Check Bundles are correctly formatted
    needs: [pnpm]
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install node dependencies
        run: pnpm i

      - name: Check Bundles
        run: pnpm check

  CheckCompat:
    name: Check mod compatibility (fabric.mod.json)
    needs: [pnpm]
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install node dependencies
        run: pnpm i

      # Jars are keyed by immutable Modrinth version id, so cache them between runs.
      - name: Cache mod jars
        uses: actions/cache@v4
        with:
          path: oneclient/.cache/jars
          key: mod-jars-${{ hashFiles('oneclient/mrpacks/**/*.pw.toml') }}
          restore-keys: |
            mod-jars-

      - name: Unit test version matcher
        run: pnpm test

      - name: Check compatibility
        run: pnpm check:compat
